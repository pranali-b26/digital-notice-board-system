<!DOCTYPE html>

<html>
<head>
    <title>Plagiarism Checker Dashboard</title>

```
<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
```

</head>
<body>

<div class="dashboard">

```
<!-- SIDEBAR -->
<div class="sidebar">

    <div class="top-profile">
        <img id="sidebarProfilePic" src="https://i.pravatar.cc/80" alt="Profile">
        <span id="sidebarName">John Doe</span>
    </div>

    <h2 class="logo">PlagCheck</h2>

    <ul class="menu">
        <li class="active" onclick="showTool('text', this)">📝 Text Checker</li>
        <li onclick="showTool('document', this)">📄 Document Upload</li>
        <li onclick="showTool('image', this)">🖼 Image OCR Check</li>
        <li onclick="showTool('profile', this)">👤 Edit Profile</li>
    </ul>

</div>


<!-- MAIN CONTENT -->
<div class="main">

    <div class="header">
        <h1>Plagiarism Detection Dashboard</h1>
    </div>


    <!-- TEXT TOOL -->
    <div id="textTool" class="tool-section">

        <div class="text-area-container">

            <textarea id="text1" placeholder="Paste First Text Here..."></textarea>

            <textarea id="text2" placeholder="Paste Second Text Here..."></textarea>

        </div>

        <button onclick="checkText()">Check Similarity</button>

        <div class="result">

            <h2 id="resultText"></h2>

            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>

        </div>

    </div>



    <!-- DOCUMENT TOOL -->
    <div id="documentTool" class="tool-section hidden">

        <h3>Upload Two Documents (PDF / DOCX)</h3>

        <label>Document 1</label>
        <input type="file" id="docFile1" accept=".pdf,.docx">

        <br><br>

        <label>Document 2</label>
        <input type="file" id="docFile2" accept=".pdf,.docx">

        <br><br>

        <button onclick="checkDocument()">Upload & Check</button>

    </div>



    <!-- IMAGE TOOL -->
    <div id="imageTool" class="tool-section hidden">

        <h3>Upload Two Images for OCR Comparison</h3>

        <label>Image 1</label>
        <input type="file" id="imgFile1" accept="image/*">

        <br><br>

        <label>Image 2</label>
        <input type="file" id="imgFile2" accept="image/*">

        <br><br>

        <button onclick="checkImage()">Scan Images</button>

    </div>



    <!-- PROFILE TOOL -->
    <div id="profileTool" class="tool-section hidden">

        <h2>Edit Profile</h2>

        <div class="profile-edit">

            <label>Full Name</label>
            <input type="text" id="profileName" value="John Doe">

            <label>Email</label>
            <input type="email" id="profileEmail" value="john.doe@example.com">

            <label>Username</label>
            <input type="text" id="profileUsername" value="johndoe">

            <label>Profile Picture</label>
            <input type="file" id="profilePic">

            <button onclick="saveProfile()">Save Changes</button>

        </div>

        <div id="profileMessage"></div>

    </div>


</div>
```

</div>

<!-- JS -->

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
